<!DOCTYPE html>
<html lang="en">

<head>
    <title>Register</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="Register">
        <h1 class="register-title">Create an account to start investing!</h1>

        {% if request.query_params.get("error") == "repeated_email" %}
            <p style="color: red;">Email already registered, Login!</p>
        {% endif %}

        <form action="/authentication/register-form" method="post">
            <input type="text" name="fullname" placeholder="Enter your Fullname" required>
            <input type="email" name="email" placeholder="Enter your Email" required>
            <input type="password" name="password" placeholder="Enter your Password" required>
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="/authentication/login", class="here">Login here</a></p>
    </div>
</body>

</html>
