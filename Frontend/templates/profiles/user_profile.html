<!DOCTYPE html>
<html lang="en">

<head>
    <title>User Profile</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="Profiles">
        <div class="Personal-Data">
            <h1>Personal Data</h1>
            <div class="Personal-Information">
                <p>User: {{ user.fullname }} </p>
            </div>
        </div>

        <div class="Actions">
            <h2>Update your information</h2>

            {% if request.query_params.get("success") == "updated" %}
                <p style="color:green;">Data updated successfully</p>
            {% endif %}

            <form action="/profile/update-me-form" method="post">
                <input type="text" name="fullname" value="{{ user.fullname }}" required>
                <input type="email" name="email" value="{{ user.email }}" required>
                <input type="password" name="password" placeholder="New password">
                <button type="submit">Update Account</button>
            </form>

            <h2>Delete your account</h2>
            <form action="/profile/delete-me-form" method="post">
                <button type="submit">Delete Account</button>
            </form>

            <h2>Logout</h2>
            <form action="/authentication/logout-form" method="post">
                <button type="submit">Logout</button>
            </form>
        </div>

        <div class="navigation">
            <h2>🏦 Market 🏦</h2>
            <a href="/mercado/dashboard">
                <button>Back to Dashboard</button>
            </a>
            <h2>📊 My Portfolio 📊</h2>
            <a href="/miportfolio/actives">
                <button>Portfolio</button>
            </a>
        </div>
    </div>
</body>

</html>
